services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hermes}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes_orchestrator}"]
      interval: 2s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      HERMES_ORCHESTRATOR_ENVIRONMENT: development
      HERMES_ORCHESTRATOR_DATABASE_URL: postgresql+psycopg://hermes:hermes@postgres:5432/hermes_orchestrator
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
